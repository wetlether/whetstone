<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0f1115"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Whetstone"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<title>Whetstone</title>
<style>
  :root{--bg:#0f1115;--panel:#171a21;--panel2:#1e222b;--ink:#e8ebf0;--dim:#9aa3b2;--line:#2a2f3a;
    --accent:#e0a458;--accent2:#7bd0a8;--good:#52c98a;--bad:#e8736b;--blue:#6ea8fe;--purp:#b79cf0;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:radial-gradient(1000px 520px at 50% -10%,#1a1e27,#0f1115);color:var(--ink);
    font:16px/1.5 -apple-system,Segoe UI,Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  .wrap{max-width:640px;margin:0 auto;padding:14px 16px 90px}
  .topbar{display:flex;align-items:center;gap:12px;padding:6px 0 16px;position:sticky;top:0;background:linear-gradient(#0f1115,#0f1115ee);z-index:5}
  .logo{font-weight:800;font-size:19px} .logo .s{color:var(--accent)}
  .stat{margin-left:auto;display:flex;gap:10px}
  .pill{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-weight:800;font-size:14px}
  .pill small{color:var(--dim);font-weight:600;margin-left:3px}
  h1{font-size:21px;margin:4px 0 2px} .sub{color:var(--dim);margin:0 0 16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;margin:0 0 13px}
  .btn{appearance:none;border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:14px;
    padding:14px 16px;font-weight:800;cursor:pointer;font-size:16px;transition:.12s;width:100%}
  .btn:active{transform:scale(.99)} .btn.primary{background:linear-gradient(180deg,#e7b06a,#d2913f);color:#241a0c;border:none}
  .btn.ghost{background:none;border:none;color:var(--blue);width:auto;padding:10px}
  .skill{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:9px}
  .skill .nm{font-weight:800} .skill .tier{font-size:11px;color:var(--accent);font-weight:800;letter-spacing:.4px}
  .skill .pct{float:right;color:var(--dim);font-weight:700}
  .bar{height:7px;border-radius:6px;background:#0c0e12;overflow:hidden;margin-top:7px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));width:0;transition:width .4s}
  .dots{display:flex;gap:5px;margin-bottom:14px} .dot{flex:1;height:6px;border-radius:6px;background:var(--line)}
  .dot.done{background:var(--accent)} .dot.cur{background:var(--blue)}
  .kicker{font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--accent);font-weight:800;margin-bottom:8px}
  .kicker.c{color:var(--purp)}
  .scenario{background:var(--panel2);border-left:3px solid var(--accent);border-radius:10px;padding:15px;margin:4px 0 16px;font-size:16.5px}
  .scenario.c{border-left-color:var(--purp)}
  .opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1.5px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;color:var(--ink);font-size:16px;transition:.12s}
  .opt:active{transform:scale(.995)} .opt .tag{font-weight:900;color:var(--blue);margin-right:8px}
  .opt.good{border-color:var(--good);background:rgba(82,201,138,.13)} .opt.bad{border-color:var(--bad);background:rgba(232,115,107,.11)}
  .opt.pick{border-color:var(--purp);background:rgba(183,156,240,.12)} .opt.dim{opacity:.5}
  .why{display:block;width:100%;text-align:left;background:var(--panel2);border:1.5px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:9px;cursor:pointer;font-size:15px;color:var(--ink)}
  .why.good{border-color:var(--good);background:rgba(82,201,138,.13)} .why.bad{border-color:var(--bad)}
  .reveal{border-radius:14px;padding:15px;margin:8px 0 4px;border:1px solid var(--line)}
  .reveal.ok{background:rgba(82,201,138,.08);border-color:var(--good)} .reveal.no{background:rgba(232,115,107,.08);border-color:var(--bad)} .reveal.c{background:rgba(183,156,240,.08);border-color:var(--purp)}
  .case{margin:8px 0;padding:10px 12px;background:var(--panel2);border-radius:10px;font-size:14.5px}
  .case b{color:var(--accent2)}
  textarea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;color:var(--ink);padding:12px;font:15px inherit;min-height:84px;resize:vertical}
  .muted{color:var(--dim);font-size:14px} .big{font-size:38px;font-weight:900;color:var(--accent)} .center{text-align:center}
  .bank{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;font-size:14px}
  .bank .q{font-weight:700;margin-bottom:4px} .bank .n{color:var(--purp);margin-top:6px;white-space:pre-wrap}
</style>
  <script async src="https://wetlether-hub-production.up.railway.app/z/z.js?s=whetstone"></script>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div class="logo">🪨 Whet<span class="s">stone</span></div>
    <div class="stat"><div class="pill">🔥 <span id="streak">0</span><small>day</small></div><div class="pill">✦ <span id="xp">0</span><small>xp</small></div></div></div>
  <div id="view"></div>
</div>
<script src="items.js"></script>
<script>
const SKILL={bug:'Finding the real bug',problem:'Naming the real problem',clear:'Being clear',thinking:'Thinking it through',ripples:'Seeing the ripples',doubt:'Not taking it on faith',first:'First things first',flip:'Flipping the problem',good:'Knowing what is good'};
const ITEMS=(window.ITEMS||[]).filter(i=>i&&i.scenario&&i.A&&i.B&&SKILL[i.sk]&&(i.contested||/^[AB]$/.test(i.better)));
const SKILLS=[...new Set(ITEMS.map(i=>i.sk))];
const REASONS=[...new Set(ITEMS.filter(i=>!i.contested&&i.whyBetter).map(i=>i.whyBetter))];
const EXPLOIT=(window.EXPLOIT||[]); const PROFILE=window.PROFILE||{strengths:[],weaknesses:[]};
const KEY='whetstone_v3', today=()=>new Date().toISOString().slice(0,10);
let S=Object.assign({xp:0,dayStreak:0,lastPlayed:null,sessions:0,skills:{},items:{},banked:[],history:[]},(()=>{try{return JSON.parse(localStorage.getItem(KEY))||{}}catch{return{}}})());
const save=()=>localStorage.setItem(KEY,JSON.stringify(S));
const sk=k=>S.skills[k]||(S.skills[k]={seen:0,right:0,level:1,lvSeen:0,lvRight:0});
const itm=id=>S.items[id]||(S.items[id]={seen:0,right:0,wrong:0,last:0});
const rate=k=>{const x=S.skills[k];return x&&x.seen?x.right/x.seen:0};
const pct=k=>Math.round(rate(k)*100);
const maxLv=k=>Math.max(1,...ITEMS.filter(i=>i.sk===k).map(i=>i.level||1));
const LV=['','warm-up','for real','the fine ear','master'];
const lvName=n=>LV[Math.min(n,4)]||('depth '+n);
function streakTick(){const t=today();if(S.lastPlayed===t)return;const y=new Date(Date.now()-864e5).toISOString().slice(0,10);S.dayStreak=S.lastPlayed===y?S.dayStreak+1:1;S.lastPlayed=t;}

function pickSession(n=10){const now=Date.now();
  return ITEMS.map(i=>{const r=S.items[i.id]||{seen:0,right:0,wrong:0,last:0};
    const weak=(1-rate(i.sk))+.2, fresh=r.seen===0?1.7:1;
    const cur=sk(i.sk).level, fit=(i.level||1)===cur?1.5:((i.level||1)<cur?.6:.35);
    const due=r.last?Math.min(1.5,(now-r.last)/(36e5*5)):1.2, miss=(r.wrong+1)/(r.right+1);
    return {i,w:weak*fresh*fit*due*miss*(.7+Math.random()*.6)};
  }).sort((a,b)=>b.w-a.w).slice(0,Math.min(n,ITEMS.length)).map(x=>x.i).sort(()=>Math.random()-.5);}

const el=h=>{const d=document.createElement('div');d.innerHTML=h;return d.firstElementChild};
const V=()=>document.getElementById('view'), esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function setStat(){const a=document.getElementById('streak'),b=document.getElementById('xp');if(a)a.textContent=S.dayStreak;if(b)b.textContent=S.xp;}
let sess=null;

function render(){setStat();
  if(!ITEMS.length){V().innerHTML=`<div class="card center"><h1>Sharpening the stones… 🔨</h1><p class="sub">Re-open in a moment.</p></div>`;return;}
  const weakest=[...SKILLS].sort((a,b)=>rate(a)-rate(b))[0];
  V().innerHTML='';
  V().appendChild(el(`<div class="card"><h1>Two ways to sharpen</h1>
    <p class="sub">No tells to read in either. Train the gaps, or learn to spot the calls that are yours to make.</p>
    <button class="btn primary" id="go">🪨 Train your weak spots ›</button>
    <button class="btn" id="exploit" style="margin-top:9px">✨ Exploit your strengths ›</button>
    <button class="btn ghost" id="prof" style="margin-top:8px">🎯 My verified skill set</button>
    <button class="btn ghost" id="score" style="margin-top:8px">📊 Score my coding</button>
    ${weakest?`<p class="muted" style="margin-top:11px">Training leans on <b style="color:var(--accent)">${SKILL[weakest]}</b> today.</p>`:''}</div>`));
  if(S.banked.length)V().appendChild(el(`<div class="card"><button class="btn" id="bank">🗂 Banked thoughts (${S.banked.length}) ›</button></div>`));
  const g=el(`<div class="card"><h1 style="font-size:17px">Your nine ears</h1><div id="sg"></div></div>`);V().appendChild(g);
  SKILLS.sort((a,b)=>rate(a)-rate(b)).forEach(k=>{const x=sk(k);
    g.querySelector('#sg').appendChild(el(`<div class="skill"><div><span class="nm">${SKILL[k]}</span> <span class="tier">· ${lvName(x.level)}${maxLv(k)>1?' '+x.level+'/'+maxLv(k):''}</span><span class="pct">${x.seen?pct(k)+'%':'new'}</span></div><div class="bar"><i style="width:${pct(k)}%"></i></div></div>`));});
  if(S.history.length>1){const last=S.history.slice(-14);
    V().appendChild(el(`<div class="card"><h1 style="font-size:17px">How your ear's tuning</h1><div style="display:flex;align-items:flex-end;height:74px;gap:5px">${last.map(h=>`<div title="${h.date}: ${h.acc}%" style="flex:1;background:linear-gradient(180deg,var(--accent2),var(--accent));border-radius:4px 4px 0 0;height:${Math.max(6,h.acc)}%"></div>`).join('')}</div><p class="muted">last ${last.at(-1).acc}%</p></div>`));}
  document.getElementById('go').onclick=start;
  document.getElementById('exploit').onclick=startExploit;
  document.getElementById('prof').onclick=showProfile;
  document.getElementById('score').onclick=()=>location.href='score.html';
  const bb=document.getElementById('bank'); if(bb)bb.onclick=showBank;}

function showProfile(){V().innerHTML='';
  V().appendChild(el(`<div class="card"><h1 style="font-size:19px">🎯 Your verified skill set</h1>
    <p class="sub">Measured blind against the field across five experiments. Use it in Exploit mode when a call is yours to make.</p>
    <button class="btn ghost" id="home">‹ Home</button></div>`));
  const s=el(`<div class="card"><h1 style="font-size:16px;color:var(--accent2)">Strengths — lean in</h1></div>`);
  PROFILE.strengths.forEach(x=>s.appendChild(el(`<div class="bank"><div class="q" style="color:var(--accent2)">${esc(x.name)}</div><div class="muted">${esc(x.desc)}</div></div>`)));
  V().appendChild(s);
  const w=el(`<div class="card"><h1 style="font-size:16px;color:var(--bad)">Weak spots — delegate or train</h1></div>`);
  PROFILE.weaknesses.forEach(x=>w.appendChild(el(`<div class="bank"><div class="q" style="color:var(--bad)">${esc(x.name)}</div><div class="muted">${esc(x.desc)}</div></div>`)));
  V().appendChild(w);
  document.getElementById('home').onclick=render;}

function startExploit(){ if(!EXPLOIT.length){showProfile();return;} streakTick();save();
  exsess={q:[...EXPLOIT].sort(()=>Math.random()-.5).slice(0,Math.min(8,EXPLOIT.length)),i:0,right:0,xp:0}; renderExploit();}
let exsess=null;
function renderExploit(){setStat();const it=exsess.q[exsess.i],n=exsess.q.length;
  const order=it.options.map((t,j)=>({t,j})).sort(()=>Math.random()-.5);
  V().innerHTML='';
  const c=el(`<div class="card"><div class="dots">${exsess.q.map((_,k)=>`<div class="dot ${k<exsess.i?'done':k===exsess.i?'cur':''}"></div>`).join('')}</div>
    <div class="kicker" style="color:var(--accent2)">Exploit · which call is yours to make?</div>
    <div class="scenario">${esc(it.scenario)}</div>
    <div class="muted" style="margin-bottom:9px">Which best fits your verified strengths? (Forget the skill names? <a id="peek" style="color:var(--blue);cursor:pointer">peek</a>)</div>
    ${order.map(o=>`<button class="opt" data-j="${o.j}">${esc(o.t)}</button>`).join('')}</div>`);
  V().appendChild(c);
  c.querySelector('#peek').onclick=showProfile;
  c.querySelectorAll('.opt').forEach(b=>b.onclick=()=>pickExploit(it,+b.dataset.j,c));}
function pickExploit(it,j,c){const ok=j===it.best;
  c.querySelectorAll('.opt').forEach(b=>{b.onclick=null;if(+b.dataset.j===it.best)b.classList.add('good');else if(+b.dataset.j===j)b.classList.add('bad');else b.classList.add('dim');});
  if(ok){exsess.right++;S.xp+=10;exsess.xp+=10;}else S.xp+=2; save();setStat();
  const r=el(`<div class="reveal ${ok?'ok':'no'}"><b>${ok?'✓ That is your move':'✕ The one that fits you was the highlighted one'}</b>
    <div class="case" style="margin-top:6px">${esc(it.why)}</div>
    <button class="btn primary" id="next" style="margin-top:11px">${exsess.i+1<exsess.q.length?'Next ›':'Finish ✓'}</button></div>`);
  V().appendChild(r);r.scrollIntoView({behavior:'smooth',block:'center'});
  document.getElementById('next').onclick=()=>{exsess.i++;exsess.i<exsess.q.length?renderExploit():exEnd();};}
function exEnd(){V().innerHTML='';
  V().appendChild(el(`<div class="card center"><div class="kicker" style="color:var(--accent2)">Exploit done</div><div class="big">+${exsess.xp} xp</div>
    <p class="sub">${exsess.right}/${exsess.q.length} matched your strengths</p>
    <button class="btn primary" id="again">Again ›</button><button class="btn ghost" id="home" style="margin-top:9px">Home</button></div>`));
  document.getElementById('again').onclick=startExploit;document.getElementById('home').onclick=render;}

function start(){if(!ITEMS.length)return;streakTick();S.sessions++;save();sess={q:pickSession(10),i:0,right:0,graded:0,xp:0};renderItem();}

function renderItem(){setStat();const it=sess.q[sess.i],n=sess.q.length;
  const flip=Math.random()<.5,A=flip?it.B:it.A,B=flip?it.A:it.B;
  sess.flip=flip; sess.goodSlot=it.contested?null:((it.better==='A')?(flip?'B':'A'):(flip?'A':'B'));
  V().innerHTML='';
  const c=el(`<div class="card"><div class="dots">${sess.q.map((_,k)=>`<div class="dot ${k<sess.i?'done':k===sess.i?'cur':''}"></div>`).join('')}</div>
    <div class="kicker ${it.contested?'c':''}">${SKILL[it.sk]} · ${it.contested?'judgment call':lvName(it.level||1)}</div>
    <div class="scenario ${it.contested?'c':''}">${esc(it.scenario)}</div>
    <div class="muted" style="margin-bottom:9px">${it.contested?'Both are defensible. Pick the one you would make:':'Which is the better move?'}</div>
    <button class="opt" data-s="A"><span class="tag">A</span>${esc(A)}</button>
    <button class="opt" data-s="B"><span class="tag">B</span>${esc(B)}</button></div>`);
  V().appendChild(c);
  c.querySelectorAll('.opt').forEach(b=>b.onclick=()=>it.contested?pickContested(it,b.dataset.s,c):pickGraded(it,b.dataset.s,c));}

function pickGraded(it,slot,c){const ok=slot===sess.goodSlot;
  // neutral-mark only — DO NOT reveal correctness yet; that would leak the answer before the free-text rep
  c.querySelectorAll('.opt').forEach(b=>{b.onclick=null;if(b.dataset.s===slot)b.classList.add('pick');else b.classList.add('dim');});
  const s=sk(it.sk);s.seen++;s.lvSeen=(s.lvSeen||0)+1;itm(it.id).seen++;itm(it.id).last=Date.now();sess.graded++;
  if(ok){s.right++;s.lvRight=(s.lvRight||0)+1;itm(it.id).right++;sess.right++;S.xp+=10;sess.xp+=10;}else itm(it.id).wrong++;
  // mastery -> level up
  let leveled=false;
  if(s.lvSeen>=4&&s.lvRight/s.lvSeen>=.75&&s.level<maxLv(it.sk)){s.level++;s.lvSeen=0;s.lvRight=0;leveled=true;}
  save();setStat();
  freeWhy(it,ok,leveled);}

// Step 1: articulate it yourself, with nothing to read off. This is the real training and has zero tell.
function freeWhy(it,ok,leveled){
  const w=el(`<div class="card"><div class="kicker">First — say it in your own words</div>
    <div class="muted" style="margin-bottom:9px">Why is the move you picked the stronger one — or what's the real tradeoff? No options to read. This is the rep that matters.</div>
    <textarea id="wta" placeholder="Your read…"></textarea>
    <button class="btn primary" id="wsv" style="margin-top:10px">Compare with the expert read ›</button></div>`);
  V().appendChild(w);w.scrollIntoView({behavior:'smooth',block:'center'});
  document.getElementById('wsv').onclick=()=>revealCompare(it,ok,leveled,document.getElementById('wta').value.trim());}

// Step 2: now it's safe to reveal. Self-compare your articulation against the expert read.
function revealCompare(it,ok,leveled,mine){
  document.querySelectorAll('.opt').forEach(b=>{b.classList.remove('pick','dim');if(b.dataset.s===sess.goodSlot)b.classList.add('good');else b.classList.add('bad');});
  const r=el(`<div class="reveal ${ok?'ok':'no'}"><b>${ok?'✓ You felt it':'✕ The lean went the other way'} · <span style="color:var(--accent)">${SKILL[it.sk]}</span>${leveled?' · <span style="color:var(--accent2)">level up!</span>':''}</b>
    ${mine?`<div class="case"><b>Your read:</b> ${esc(mine)}</div>`:''}
    <div class="case"><b>The lean, and why:</b> ${esc(it.whyBetter)}</div>
    <div class="case"><b>The real case for the other:</b> ${esc(it.whyOther)}</div>
    <button class="btn primary" id="fine" style="margin-top:11px">One more — the fine distinction ›</button></div>`);
  V().appendChild(r);r.scrollIntoView({behavior:'smooth',block:'center'});
  document.getElementById('fine').onclick=()=>secondaryMC(it,ok,leveled);}

// Step 3: secondary check — four close reads, exactly one right, equalized so only the logic distinguishes them.
function secondaryMC(it,ok,leveled){
  const rs=(it.reasons&&it.reasons.length>=2)?it.reasons.slice():null;
  if(!rs){tailGraded(it,ok,leveled);return;}
  const choices=rs.sort(()=>Math.random()-.5);
  const w=el(`<div class="card"><div class="kicker">Secondary check · four close reads — exactly one is right, the others each miss by one thing</div>
    ${choices.map((r,j)=>`<button class="why" data-i="${j}">${esc(r.t)}</button>`).join('')}</div>`);
  V().appendChild(w);w.scrollIntoView({behavior:'smooth',block:'center'});
  w.querySelectorAll('.why').forEach(b=>b.onclick=()=>{const chosen=choices[+b.dataset.i];
    w.querySelectorAll('.why').forEach(x=>{x.onclick=null;const xv=choices[+x.dataset.i];if(xv.ok)x.classList.add('good');else if(x===b)x.classList.add('bad');});
    if(chosen.ok){S.xp+=5;sess.xp+=5;}save();setStat();tailGraded(it,ok,leveled);});}

function tailGraded(it,ok,leveled){
  const r=el(`<div class="reveal ${ok?'ok':'no'}"><div id="dz"></div>
    <button class="btn" id="dis" style="font-size:14px">🤔 I see it differently — bank it</button>
    <button class="btn primary" id="next" style="margin-top:9px">${sess.i+1<sess.q.length?'Next ›':'Finish ✓'}</button></div>`);
  V().appendChild(r);r.scrollIntoView({behavior:'smooth',block:'center'});
  document.getElementById('dis').onclick=()=>{const dz=document.getElementById('dz');if(dz.querySelector('textarea'))return;
    dz.innerHTML=`<textarea id="dta" placeholder="Why do you read it differently? (different theory of mind — we'll dig into it later)"></textarea><button class="btn" id="dsave" style="margin-top:8px">Bank this disagreement</button>`;
    document.getElementById('dsave').onclick=()=>{const note=document.getElementById('dta').value.trim();if(!note)return;
      S.banked.push({date:today(),id:it.id,scenario:it.scenario,A:it.A,B:it.B,type:'disagree',lean:it.whyBetter,note});save();
      dz.innerHTML='<div class="muted">Banked. We will dig in. ✓</div>';};};
  document.getElementById('next').onclick=()=>{sess.i++;sess.i<sess.q.length?renderItem():end();};}

function pickContested(it,slot,c){
  c.querySelectorAll('.opt').forEach(b=>{b.onclick=null;if(b.dataset.s===slot)b.classList.add('pick');else b.classList.add('dim');});
  itm(it.id).seen++;itm(it.id).last=Date.now();S.xp+=8;sess.xp+=8;save();setStat();
  const picked=slot==='A'?it.A:it.B;
  const w=el(`<div class="card"><div class="kicker c">Your call — now say why (this gets banked)</div>
    <textarea id="ta" placeholder="What made you pick that? What are you seeing?"></textarea>
    <button class="btn primary" id="sv" style="margin-top:10px">Save & see both cases ›</button></div>`);
  V().appendChild(w);w.scrollIntoView({behavior:'smooth',block:'center'});
  document.getElementById('sv').onclick=()=>{const note=document.getElementById('ta').value.trim();
    S.banked.push({date:today(),id:it.id,scenario:it.scenario,A:it.A,B:it.B,type:'contested',pick:picked,note});save();
    revealContested(it);};}

function revealGraded(it,ok,leveled){
  const r=el(`<div class="reveal ${ok?'ok':'no'}"><b>${ok?'✓ You felt it':'✕ The lean went the other way'} · <span style="color:var(--accent)">${SKILL[it.sk]}</span>${leveled?' · <span style="color:var(--accent2)">level up!</span>':''}</b>
    <div class="case"><b>Why that one's stronger:</b> ${esc(it.whyBetter)}</div>
    <div class="case"><b>The real case for the other:</b> ${esc(it.whyOther)}</div>
    <div id="dz"></div>
    <button class="btn" id="dis" style="margin-top:10px;font-size:14px">🤔 I see it differently — bank it</button>
    <button class="btn primary" id="next" style="margin-top:9px">${sess.i+1<sess.q.length?'Next ›':'Finish ✓'}</button></div>`);
  V().appendChild(r);r.scrollIntoView({behavior:'smooth',block:'center'});
  document.getElementById('dis').onclick=()=>{const dz=document.getElementById('dz');if(dz.querySelector('textarea'))return;
    dz.innerHTML=`<textarea id="dta" placeholder="Why do you read it differently? (different theory of mind — we'll dig into it later)"></textarea><button class="btn" id="dsave" style="margin-top:8px">Bank this disagreement</button>`;
    document.getElementById('dsave').onclick=()=>{const note=document.getElementById('dta').value.trim();if(!note)return;
      S.banked.push({date:today(),id:it.id,scenario:it.scenario,A:it.A,B:it.B,type:'disagree',lean:it.whyBetter,note});save();
      dz.innerHTML='<div class="muted">Banked. We will dig in. ✓</div>';};};
  document.getElementById('next').onclick=()=>{sess.i++;sess.i<sess.q.length?renderItem():end();};}

function revealContested(it){
  const r=el(`<div class="reveal c"><b style="color:var(--purp)">A real judgment call — no wrong answer</b>
    <div class="case"><b>Case for A:</b> ${esc(it.caseA)}</div>
    <div class="case"><b>Case for B:</b> ${esc(it.caseB)}</div>
    <div class="muted" style="margin-top:6px">Your reasoning's banked. ✓</div>
    <button class="btn primary" id="next" style="margin-top:11px">${sess.i+1<sess.q.length?'Next ›':'Finish ✓'}</button></div>`);
  V().appendChild(r);r.scrollIntoView({behavior:'smooth',block:'center'});
  document.getElementById('next').onclick=()=>{sess.i++;sess.i<sess.q.length?renderItem():end();};}

function end(){const acc=sess.graded?Math.round(100*sess.right/sess.graded):0;
  S.history.push({date:today(),acc});save();V().innerHTML='';
  V().appendChild(el(`<div class="card center"><div class="kicker">Session done</div><div class="big">+${sess.xp} xp</div>
    <p class="sub">${sess.right}/${sess.graded} on the graded calls${sess.graded<sess.q.length?` · ${sess.q.length-sess.graded} judgment calls banked`:''}</p>
    <button class="btn primary" id="again">Go again ›</button><button class="btn ghost" id="home" style="margin-top:9px">Home</button></div>`));
  document.getElementById('again').onclick=start;document.getElementById('home').onclick=render;}

function showBank(){V().innerHTML='';
  V().appendChild(el(`<div class="card"><h1 style="font-size:19px">Banked thoughts</h1>
    <p class="sub">Where your read differs, or a call you reasoned through. Bring these to a longer conversation.</p>
    <button class="btn" id="copy">📋 Copy all for discussion</button>
    <button class="btn ghost" id="home" style="margin-top:8px">‹ Home</button></div>`));
  [...S.banked].reverse().forEach(b=>{
    V().appendChild(el(`<div class="bank"><div class="q">${esc(b.scenario)}</div>
      <div class="muted">${b.type==='contested'?'Judgment call · you chose: ':'You disagreed · '}${b.pick?esc(b.pick):''}</div>
      ${b.note?`<div class="n">“${esc(b.note)}”</div>`:'<div class="muted">(no note)</div>'}
      <div class="muted" style="margin-top:5px;font-size:12px">${b.date}</div></div>`));});
  document.getElementById('home').onclick=render;
  document.getElementById('copy').onclick=()=>{const t=S.banked.map(b=>`SCENARIO: ${b.scenario}\nA: ${b.A}\nB: ${b.B}\n[${b.type}] pick: ${b.pick||''}\nMY NOTE: ${b.note||''}`).join('\n\n---\n\n');
    navigator.clipboard?.writeText(t).then(()=>{document.getElementById('copy').textContent='✓ Copied';},()=>{});};}

render();
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
